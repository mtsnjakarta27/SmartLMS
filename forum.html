            id="inputChat"

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl =
"https://yvfjhrlfgmrsfutsnfcr.supabase.co";

const supabaseKey =
"sb_publishable_8Dqg47ovewX9f9Ogz8no2w_bWcrUTRI";

const { createClient } = supabase;

const supabaseClient =
createClient(
    supabaseUrl,
    supabaseKey
);
</script>
<script>

async function loadPesan(){

    const topik =
        document.getElementById("topikDiskusi").value;

    const { data, error } =
    await supabaseClient
    .from("diskusi")
    .select("*")

        .eq("topik", topik)
        .order("created_at",{ascending:true});

    if(error){
        console.log(error);
        return;
    }

    const chatBox =
        document.getElementById("chatBox");

    chatBox.innerHTML = "";

    const userLogin =
    JSON.parse(localStorage.getItem("userLogin"));

    data.forEach(item => {

    chatBox.innerHTML += `
    <div class="
        ${item.users_id === userLogin.id
            ? 'text-right'
            : 'text-left'}
    ">

            <div class="
                inline-block
                max-w-xl
                p-4
                rounded-2xl
                ${
                    item.user_id === userLogin.id
                    ? 'bg-indigo-600 text-white'
                    : 'bg-white border border-slate-200 text-slate-800'
                }
            ">

                <p class="font-bold text-sm mb-2">
                    ${item.nama_pengirim}
                </p>

                <p>
                    ${item.pesan}
                </p>

            </div>

        </div>
        `;
    });

    chatBox.scrollTop =
        chatBox.scrollHeight;
}

</script>

<script>
async function kirimPesan(){

    const input =
        document.getElementById("inputChat");

    if(input.value.trim() === "")
        return;

    const user =
        JSON.parse(
            localStorage.getItem("userLogin")
        );
        console.log("USER LOGIN:", user);

    const topik =
        document.getElementById(
            "topikDiskusi"
        ).value;

    console.log({
    user_id: user.id,
    topik: topik,
    pesan: input.value
});

    const { error } =
    await supabaseClient
    .from("diskusi")
    .insert([
{
        user_id: user.id,
        nama_pengirim: user.nama,
        role: user.role,
        topik: topik,
        pesan: input.value
    }
]);

    if(error){
        console.log(error);
        alert(error.message);
        return;
    }

    input.value = "";

    loadPesan();
}

</script>
<script>
loadPesan();
</script>
