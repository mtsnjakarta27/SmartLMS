<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('w2.jpg'); background-size: cover; background-position: center; background-attachment: fixed; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="glass p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center">
        <div class="text-4xl mb-4">👨‍🏫</div>
        <h2 class="text-2xl font-black text-slate-800">Login Guru</h2>
        <form class="mt-6 space-y-4 text-left">
            <input
                id="nip"
                type="text"
                placeholder="NIP"
                class="w-full px-5 py-3 rounded-2xl bg-white border border-slate-200 outline-none focus:ring-2 focus:ring-emerald-500">
            <input
                id="passwordGuru"
                type="password"
                placeholder="Password"
                class="w-full px-5 py-3 rounded-2xl bg-white border border-slate-200 outline-none focus:ring-2 focus:ring-emerald-500">
            <button
                type="button"
                onclick="loginGuru()"
                class="w-full bg-emerald-600 text-white py-3 rounded-2xl font-black hover:bg-emerald-700 transition">
                    Masuk
            </button>
        </form>
        <p class="mt-6 text-xs font-bold text-slate-500">Belum punya akun? <a href="register_guru.html" class="text-emerald-600 underline">Daftar Sekarang</a></p>
        <a href="index.html" class="block mt-4 text-[10px] text-slate-400 font-bold uppercase hover:text-black">Kembali</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>

const supabaseUrl =
    "https://yvfjhrlfgmrsfutsnfcr.supabase.co";

const supabaseKey =
    "sb_publishable_8Dqg47ovewX9f9Ogz8no2w_bWcrUTRI";

const { createClient } = supabase;

const supabaseClient =
    createClient(
        supabaseUrl,
        supabaseKey
    );

</script>
<script>

async function loginGuru(){

    const nip = document.getElementById("nip").value;
    const password = document.getElementById("passwordGuru").value;

    const { data, error } = await supabaseClient
        .from("users")
        .select("*")
        .eq("username", nip)
        .eq("password", password)
        .eq("role", "guru");

    if(error){
        alert(error.message);
        return;
    }

    if(!data || data.length === 0){
        alert("NIP atau password salah");
        return;
    }

    // 🔥 INI BAGIAN YANG KAMU TANYA (TARO DI SINI)

    localStorage.clear();

localStorage.setItem(
    "userLogin",
    JSON.stringify(data[0])
);

    alert("Login berhasil");

    window.location.href = "dashboard-guru-utama.html";
}

</script>
</body>
</html>
