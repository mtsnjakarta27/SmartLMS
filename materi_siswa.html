<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLMS - Mata Pelajaran</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f8fafc] font-sans flex h-screen overflow-hidden">
<div class="w-64 bg-white/80 backdrop-blur-xl h-full border-r border-slate-200/60 flex flex-col justify-between p-6">

    <!-- TOP SECTION -->
    <div>

        <!-- LOGO (INI YANG BENAR) -->
        <div class="flex items-center space-x-2 mb-8 px-2">
            <div class="w-8 h-8 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold text-sm">
                🎓
            </div>
            <span class="text-xl font-bold text-indigo-900">SmartLMS</span>
        </div>

        <!-- NAVIGATION -->
        <nav class="space-y-1">
        
            <a href="dashboard.html" class="flex items-center space-x-3 px-4 py-3 rounded-xl text-slate-500 hover:bg-slate-50">
                🏠 <span>Dashboard</span>
            </a>

            <a href="materi_siswa.html" class="flex items-center space-x-3 px-4 py-3 rounded-xl bg-indigo-50 text-indigo-600 font-semibold">
                📖 <span>Mata Pelajaran</span>
            </a>

            <a href="tugas.html" class="flex items-center space-x-3 px-4 py-3 rounded-xl text-slate-500 hover:bg-slate-50">
                📝 <span>Tugas</span>
            </a>

            <a href="forum.html" class="flex items-center space-x-3 px-4 py-3 rounded-xl text-slate-500 hover:bg-slate-50">
                💬 <span>Forum</span>
            </a>

        </nav>
    </div>

    <!-- BOTTOM -->
    <div class="border-t border-slate-100 pt-4">
        <button id="logoutBtn" class="w-full bg-rose-50 text-rose-600 py-2 rounded-xl font-semibold">
            🚪 Keluar
        </button>
    </div>

</div>

    <!-- KONTEN UTAMA -->
    <div class="flex-1 h-full overflow-y-auto p-8 lg:p-12">
        <div class="max-w-6xl mx-auto space-y-6">

    <!-- Header -->
    <div class="bg-gradient-to-r from-indigo-700 to-violet-700 rounded-3xl p-8 text-white">
        <h1 class="text-3xl font-black">📖 Materi Pembelajaran</h1>
        <p class="text-indigo-100 mt-2">
            Semua materi yang dibagikan oleh dosen/guru akan muncul di halaman ini.
        </p>
    </div>

    <div id="materiContainer" class="space-y-6"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://yvfjhrlfgmrsfutsnfcr.supabase.co";
const supabaseKey = "sb_publishable_8Dqg47ovewX9f9Ogz8no2w_bWcrUTRI";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

async function loadMateriSiswa() {

    const { data, error } = await supabaseClient
        .from("materi")
        .select("*")
        .order("created_at", { ascending: false });

    if (error) {
        console.log("ERROR MATERI:", error);
        return;
    }

    const container = document.getElementById("materiContainer");

    container.innerHTML = "";

    data.forEach(item => {

        container.innerHTML += `
        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-6">

            <span class="bg-indigo-100 text-indigo-600 text-xs font-bold px-3 py-1 rounded-full">
                Materi
            </span>

            <h2 class="text-xl font-bold mt-3">
                ${item.judul}
            </h2>

            <p class="text-slate-500 mt-2 text-sm">
                ${item.deskripsi || "-"}
            </p>

            <div class="mt-4 flex justify-between items-center">
                <a href="${item.file_url}" target="_blank"
                    class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-sm font-bold">
                    📄 Buka Materi
                </a>
            </div>

        </div>
        `;
    });
}

loadMateriSiswa();
</script>
</body>
</html>
