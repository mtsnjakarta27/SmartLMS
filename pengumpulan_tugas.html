    <main class="flex-1 p-10 bg-slate-950">

    <!-- HEADER -->

            Pantau semua tugas yang dikumpulkan siswa
        </div>

    <!-- FILTER -->
    <div class="flex gap-4 mb-6">
        <select class="bg-slate-900 border border-slate-700 px-4 py-2 rounded-xl">

            <option>Sudah Dinilai</option>

               placeholder="Cari nama siswa..."
               class="flex-1 bg-slate-900 border border-slate-700 px-4 py-2 rounded-xl outline-none">
    </div>

    <!-- LIST PENGUMPULAN -->
    <div
    id="listPengumpulan"
    class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    </div>

</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = " https://yvfjhrlfgmrsfutsnfcr.supabase.co";
const supabaseKey = "sb_publishable_8Dqg47ovewX9f9Ogz8no2w_bWcrUTRI";

const { createClient } = supabase;
const supabaseClient = createClient(supabaseUrl, supabaseKey);
</script>
    
    <script>
const raw = localStorage.getItem("userLogin");

console.log("RAW:", raw);

if(raw){

    const user = JSON.parse(raw);

    console.log("USER:", user);

    document.getElementById("namaProfile").innerText =
        user.nama ?? "-";

    document.getElementById("nipProfile").innerText =
        "NIP : " + (user.username ?? user.nip ?? "-");
}
</script>
<script>

async function loadPengumpulan(){

    const { data, error } =
        await supabaseClient
        .from("pengumpulan_tugas")
        .select(`
            *,
            users(nama),
            tugas(judul)
        `)
        .order(
            "created_at",
            { ascending:false }
        );

    if(error){
        console.log(error);
        return;
    }

    const container =
        document.getElementById(
            "listPengumpulan"
        );

    container.innerHTML = "";

    data.forEach(item => {

        container.innerHTML += `
        <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl">

            <div class="flex justify-between items-center mb-3">

                <h2 class="font-bold">
                    ${item.users?.nama || '-'}
                </h2>

                <span class="
                    text-xs
                    px-2
                    py-1
                    rounded-full
                    ${
                        item.status === 'submitted'
                        ? 'bg-yellow-500 text-black'
                        : 'bg-emerald-500 text-black'
                    }
                ">
                    ${item.status}
                </span>

            </div>

            <p class="text-sm text-slate-400 mb-3">
                Tugas:
                ${item.tugas?.judul || '-'}
            </p>

            <a
                href="${item.file_url}"
                target="_blank"
                class="text-emerald-400 text-sm">

                📄 Lihat File
            </a>

            ${
                item.nilai
                ? `
                    <div class="mt-4 flex justify-between text-sm">
                        <span>Nilai</span>
                        <span class="font-bold text-emerald-400">
                            ${item.nilai}
                        </span>
                    </div>
                `
                : ''
            }

        </div>
        `;
    });
}

loadPengumpulan();

</script>
</body>
