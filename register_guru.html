<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('w2.jpg'); background-size: cover; background-position: center; background-attachment: fixed; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="glass p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center">
        <h2 class="text-2xl font-black text-slate-800">Daftar Guru</h2>
        <form class="mt-6 space-y-4 text-left">

    <input
        id="namaGuru"
        type="text"
        placeholder="Nama Lengkap"
        class="w-full px-5 py-3 rounded-2xl bg-white border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500">

    <input
        id="nip"
        type="text"
        placeholder="NIP"
        class="w-full px-5 py-3 rounded-2xl bg-white border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500">

    <input
        id="passwordGuru"
        type="password"
        placeholder="Password Baru"
        class="w-full px-5 py-3 rounded-2xl bg-white border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500">

    <button
        type="button"
        onclick="registerGuru()"
        class="w-full py-3 rounded-2xl bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-black text-lg shadow-xl hover:scale-105 transition-all duration-300">
        Buat Akun Baru
    </button>

</form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseUrl = "https://yvfjhrlfgmrsfutsnfcr.supabase.co";
const supabaseKey = "sb_publishable_8Dqg47ovewX9f9Ogz8no2w_bWcrUTRI";
const { createClient } = supabase;

const supabaseClient = createClient(
    supabaseUrl,
    supabaseKey
);
</script>

<script>
async function registerGuru(){

    const nama = document.getElementById("namaGuru").value;
    const nip = document.getElementById("nip").value;
    const password = document.getElementById("passwordGuru").value;

    const { error } = await supabaseClient
        .from("users")
        .insert([
            {
                nama: nama,
                username: nip,
                password: password,
                role: "guru"
            }
        ]);

    if(error){
        alert(error.message);
        return;
    }

    alert("Registrasi guru berhasil!");

    window.location.href = "login_guru.html";
}
</script>
</body>
</html>
