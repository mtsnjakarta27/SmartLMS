    <a href="diskusi.html" class="block w-full text-left p-4 hover:bg-slate-800 rounded-2xl font-bold transition">💬 Ruang Diskusi</a>

        <div class="bg-slate-800 p-4 rounded-xl mt-6">

       class="font-bold">

       class="text-xs text-slate-400">

</div>

    <main class="flex-1 p-8">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-black">Manajemen Siswa</h1>
            <button class="bg-slate-700 px-6 py-2 rounded-xl font-bold cursor-not-allowed">
                Total Siswa: <span id="jumlahSiswa">0</span>
            </button>
        </div>
        
        <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="text-slate-400 border-b border-slate-800">
                        <th class="pb-4">Nama Siswa</th>
                        <th class="pb-4">Kehadiran</th>
                        <th class="pb-4">Progres Belajar</th>
                        <th class="pb-4">Status Tugas</th>
                        <th class="pb-4">Action</th>
                    </tr>
                </thead>
                <tbody id="tabelSiswa" class="text-sm">
                    </tbody>
            </table>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://yvfjhrlfgmrsfutsnfcr.supabase.co";
const supabaseKey = "sb_publishable_8Dqg47ovewX9f9Ogz8no2w_bWcrUTRI";

const { createClient } = supabase;

const supabaseClient = createClient(
    supabaseUrl,
    supabaseKey
);
</script>
<script>
async function loadSiswa() {

    const { data, error } = await supabaseClient
        .from("users")
        .select("*")
        .eq("role", "siswa");

    if(error){
        console.log(error);
        return;
    }

    const table =
    document.getElementById("tabelSiswa");

table.innerHTML = "";

document.getElementById("jumlahSiswa").innerText =
    data.length;

    data.forEach(siswa => {

        table.innerHTML += `
<tr class="border-b border-slate-800 hover:bg-slate-800 transition">

    <td class="py-4">
        ${siswa.nama}
    </td>

    <td class="py-4 text-slate-400">
        -
    </td>

    <td class="py-4">
        <div class="w-full bg-slate-700 rounded-full h-3">
            <div class="bg-emerald-500 h-3 rounded-full w-0"></div>
        </div>
    </td>

    <td class="py-4 text-yellow-400">
        Belum Ada Tugas
    </td>

    <td class="py-4">
        <button class="bg-blue-600 px-4 py-2 rounded-lg hover:bg-blue-500">
            Detail
        </button>
    </td>

</tr>
`;
    });
}

loadSiswa();
</script>
<script>
const raw = localStorage.getItem("userLogin");

console.log("RAW:", raw);

if(raw){

    const user = JSON.parse(raw);

    console.log("USER:", user);

    document.getElementById("namaProfile").innerText =
        user.nama ?? "-";

    document.getElementById("nipProfile").innerText =
        "NIP : " + (user.username ?? user.nip ?? "-");
}
</script>
</body>
