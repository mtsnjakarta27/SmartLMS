
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('w2.jpg'); background-size: cover; background-position: center; background-attachment: fixed; }

<body class="min-h-screen flex items-center justify-center p-4">

        <h2 class="text-2xl font-black text-slate-800">Login Siswa</h2>
        <form class="mt-6 space-y-4 text-left">
            <input
                id="nisn"
                type="text"
                placeholder="NISN"
                class="w-full px-5 py-3 rounded-2xl bg-white border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500">
            <input
                id="password"
                type="password"
                placeholder="Password"
                class="w-full px-5 py-3 rounded-2xl bg-white border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500">
            <button
            type="button"
            onclick="loginSiswa()"
            class="w-full bg-indigo-600 text-white py-3 rounded-2xl font-black hover:bg-indigo-700 transition">Masuk</button>
        </form>
        <p class="mt-6 text-xs font-bold text-slate-500">Belum punya akun? <a href="register_siswa.html" class="text-indigo-600 underline">Daftar Sekarang</a></p>

<script>

<script>

async function loginSiswa(){

    const nisn =
    document.getElementById("nisn").value;

    const password =
    document.getElementById("password").value;

    if(!nisn || !password){

        alert("Lengkapi data login");

        return;
    }

    const { data, error } =
await supabaseClient
.from("users")
.select("*")
.eq("username", nisn)
.eq("password", password)
.eq("role","siswa");

console.log("NISN INPUT:", nisn);
console.log("PASSWORD INPUT:", password);
console.log("HASIL QUERY:", data);
console.log("ERROR:", error);

if(error){

    alert(error.message);

    return;
}

    if(data.length == 0){

        alert("NISN atau Password salah");

        return;
    }

    localStorage.setItem(
    "userLogin",
    JSON.stringify(data[0])
);
console.log("LOGIN BERHASIL");
console.log(data[0]);

localStorage.setItem(
    "userLogin",
    JSON.stringify(data[0])
);

console.log(
    localStorage.getItem("userLogin")
);

window.location.href="dashboard.html";
    window.location.href="dashboard.html";

}
