<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('w2.jpg'); background-size: cover; background-position: center; background-attachment: fixed; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="glass p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center">
        <h2 class="text-2xl font-black text-slate-800">Daftar Siswa</h2>
        <form class="mt-6 space-y-4 text-left">

        <input id="nama"
            type="text"
            placeholder="Nama Lengkap"
            class="w-full px-5 py-3 rounded-2xl bg-white border border-slate-200">

        <input id="nisn"
            type="text"
            placeholder="NISN"
            class="w-full px-5 py-3 rounded-2xl bg-white border border-slate-200">

        <input id="password"
            type="password"
            placeholder="Password Baru"
            class="w-full px-5 py-3 rounded-2xl bg-white border border-slate-200">

        <button
            type="button"
            onclick="registerSiswa()"
            class="w-full bg-indigo-600 text-white py-3 rounded-2xl font-bold text-lg hover:bg-indigo-700 transition duration-300 shadow-lg mt-2">
            Buat Akun Baru
        </button>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseUrl = "https://yvfjhrlfgmrsfutsnfcr.supabase.co";
const supabaseKey = "sb_publishable_8Dqg47ovewX9f9Ogz8no2w_bWcrUTRI";
const { createClient } = supabase;

const supabaseClient = createClient(
    supabaseUrl,
    supabaseKey
);
</script>
<script>
async function registerSiswa() {

    const nama = document.getElementById("nama").value;
    const nisn = document.getElementById("nisn").value;
    const password = document.getElementById("password").value;

    const { error } = await supabaseClient
        .from("users")
        .insert([
            {
                nama: nama,
                username: nisn,
                password: password,
                role: "siswa"
            }
        ]);

    if(error){
        alert(error.message);
        return;
    }

    alert("Registrasi berhasil!");

    window.location.href = "login_siswa.html";
}
</script>
</body>
</html>
