<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLMS - Daftar Akun</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-lg shadow-md w-96">
        <h2 class="text-2xl font-bold mb-6 text-center text-indigo-600">Daftar Akun SmartLMS</h2>
        
        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Nama Lengkap</label>
                <input type="text" id="name" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50 border" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" id="email" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50 border" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="password" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50 border" required>
            </div>
            <!-- Pilihan Role Baru -->
            <div>
                <label class="block text-sm font-medium text-gray-700">Daftar Sebagai</label>
                <select id="role" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50 border" required>
                    <option value="siswa">Siswa</option>
                    <option value="admin">Guru (Admin)</option>
                </select>
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white p-2 rounded-md hover:bg-indigo-700 transition">Daftar</button>
        </form>
        
        <p class="mt-4 text-sm text-center text-gray-600">
            Sudah punya akun? <a href="index.html" class="text-indigo-600 hover:underline">Login disini</a>
        </p>
    </div>

    <script>
        // KONEKSI SUPABASE
        const SUPABASE_URL = "https://qbbxtskrwnhzwfaqbgyb.supabase.co";
        const SUPABASE_KEY = "sb_publishable_2R4kHPLuL3FujJQmcz3sog_vMlE3iMa"; // <-- Ganti pakai key panjangmu!
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value; // Mengambil nilai role

            const { data, error } = await _supabase
                .from('users')
                .insert([
                    { name: name, email: email, password: password, role: role }
                ]);

            if (error) {
                alert('Gagal mendaftar: ' + error.message);
            } else {
                alert('Pendaftaran akun ' + role + ' berhasil! Silakan login.');
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
