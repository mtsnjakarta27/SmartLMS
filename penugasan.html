    <main class="flex-1 p-10">
        <div class="bg-slate-800 p-6 rounded-2xl mb-6">

    <h2 class="text-xl font-bold mb-4">➕ Buat Tugas Baru</h2>

    <input id="judulTugas"
        placeholder="Judul tugas"
        class="w-full p-3 rounded-xl bg-slate-900 mb-3">

    <textarea id="deskripsiTugas"
        placeholder="Deskripsi tugas"
        class="w-full p-3 rounded-xl bg-slate-900 mb-3"></textarea>

    <input id="deadline"
        type="date"
        class="w-full p-3 rounded-xl bg-slate-900 mb-3">

    <button onclick="buatTugas()"
        class="bg-emerald-600 px-6 py-3 rounded-xl font-bold">
        Simpan Tugas
    </button>

</div>

<div class="bg-slate-800 p-6 rounded-2xl">

    <h2 class="text-xl font-bold mb-4">📚 Daftar Tugas</h2>

    <div id="listTugas" class="space-y-4"></div>

</div>
        
    </main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://yvfjhrlfgmrsfutsnfcr.supabase.co";
const supabaseKey = "sb_publishable_8Dqg47ovewX9f9Ogz8no2w_bWcrUTRI";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
</script>
<script>
async function loadTugas() {

    const { data, error } = await supabaseClient
        .from("tugas")
        .select("*")
        .order("created_at", { ascending:false });

    if(error){
        console.log(error);
        return;
    }

    const container = document.getElementById("listTugas");
    container.innerHTML = "";

    data.forEach(tugas => {

        container.innerHTML += `
        <div class="bg-slate-900 p-4 rounded-xl border border-slate-700">

            <h3 class="font-bold text-lg">${tugas.judul}</h3>

            <p class="text-slate-400 text-sm mb-2">
                ${tugas.deskripsi || "-"}
            </p>

            <div class="flex justify-between text-xs text-slate-500">
                <span>Deadline: ${tugas.deadline}</span>
            </div>

        </div>
        `;
    });
}

loadTugas();
</script>
<script>
async function buatTugas() {

    const judul = document.getElementById("judulTugas").value;
    const deskripsi = document.getElementById("deskripsiTugas").value;
    const deadline = document.getElementById("deadline").value;

    if(!judul || !deadline){
        alert("Judul & deadline wajib!");
        return;
    }

    const { error } = await supabaseClient
        .from("tugas")
        .insert([{
            judul,
            deskripsi,
            deadline
        }]);

    if(error){
        alert(error.message);
        return;
    }

    alert("Tugas berhasil dibuat!");
    loadTugas();
}
</script>

<script>
const raw = localStorage.getItem("userLogin");

console.log("RAW:", raw);

if(raw){

    const user = JSON.parse(raw);

    console.log("USER:", user);

    document.getElementById("namaProfile").innerText =
        user.nama ?? "-";

    document.getElementById("nipProfile").innerText =
        "NIP : " + (user.username ?? user.nip ?? "-");
}
</script>
</body>
